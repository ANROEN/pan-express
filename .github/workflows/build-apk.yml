name: Construir APK (Pan Express)

# Se puede ejecutar a mano (boton "Run workflow") o al subir cambios del APK.
on:
  workflow_dispatch:
  push:
    paths:
      - 'apk/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write   # para publicar el APK en una "release"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apk

    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias de Capacitor
        run: npm install

      - name: Preparar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Preparar Android SDK
        uses: android-actions/setup-android@v3

      - name: Sincronizar la app web dentro del proyecto Android
        run: npx cap sync android

      - name: Compilar el APK (debug)
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Renombrar el APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk pan-express.apk

      - name: Guardar el APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: pan-express-apk
          path: apk/pan-express.apk

      - name: Publicar el APK para descargar (release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk
          name: Pan Express - APK
          body: |
            APK instalable de Pan Express.
            Descarga "pan-express.apk" desde tu celular e instalala
            (permite "instalar apps de origen desconocido" si te lo pide).
          files: apk/pan-express.apk
